version: "3.8"

services:
  backend:
    build:
      context: ./saaj_backend_python
    container_name: saaj-backend
    restart: always
    expose:
      - "5000"
    env_file:
      - ./saaj_backend_python/.env
    environment:
      - ENVIRONMENT=production
    networks:
      - saaj-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./saaj_frontend
      args:
        VITE_API_URL: ""
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
    container_name: saaj-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - saaj-net

networks:
  saaj-net:
    driver: bridge
